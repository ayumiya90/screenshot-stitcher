<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>截圖拼接工具 · Abby Tools</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%8D%8A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Abby Brand Design System ================================ */
  :root {
    /* Primary */
    --primary: #FFB66E;          /* 主橘 */
    --primary-hover: #E8973D;    /* 深橘 Hover */
    --primary-tint: #FFF3E5;     /* 主橘 10% */
    --cream: #FFF8F0;            /* 奶油米白 */
    --yellow: #FADE9E;           /* 淺黃 */
    --coral: #EB8F80;            /* 珊瑚 */

    /* Neutrals */
    --text: #606060;             /* 主文字 */
    --text-secondary: #8A8A8A;   /* 次文字 */
    --text-muted: #B0B0B0;       /* 弱化 */
    --surface: #FFFFFF;          /* 卡片白 */
    --border: #E8E8E8;           /* 邊框 */
    --disabled: #D4D4D4;

    /* Semantic */
    --success: #7BC47F;
    --danger: #D9534F;
    --info: #5BC0DE;

    /* Shadows */
    --shadow-subtle: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-card: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-elevated: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-modal: 0 16px 48px rgba(0,0,0,0.16);
    --shadow-brand: 0 2px 8px rgba(255,182,110,0.3);
    --shadow-brand-hover: 0 4px 14px rgba(255,182,110,0.4);

    /* Radii */
    --r-sm: 4px;
    --r-input: 8px;
    --r-card: 12px;
    --r-lg: 16px;
    --r-pill: 9999px;
  }

  body {
    font-family: "Noto Sans TC", "Inter", "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-weight: 400;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }

  h1 {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 8px;
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 1.75;
    margin-bottom: 32px;
  }

  /* Drop Zone (特色卡片：奶油米白 + 左橘邊框) ================ */
  .drop-zone {
    background: var(--cream);
    border: 2.5px dashed var(--border);
    border-left: 4px solid var(--primary);
    border-radius: var(--r-lg);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.25s;
    margin-bottom: 24px;
    box-shadow: var(--shadow-subtle);
  }
  .drop-zone:hover,
  .drop-zone.dragover {
    border-color: var(--primary-hover);
    border-left-color: var(--primary-hover);
    background: var(--primary-tint);
    transform: translateY(-2px);
  }
  .drop-zone-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: inline-flex;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-brand);
  }
  .drop-zone-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .drop-zone-hint {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* Controls Card ========================================== */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
    padding: 20px 24px;
    background: var(--surface);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-card);
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }
  .control-group label {
    color: var(--text-secondary);
    font-weight: 500;
  }

  select, input[type="number"] {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:focus, input[type="number"]:focus {
    border-color: var(--primary-hover);
    box-shadow: 0 0 0 3px rgba(255,182,110,0.15);
  }
  input[type="number"] { width: 84px; }
  input[type="color"] {
    width: 44px;
    height: 36px;
    padding: 2px;
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    cursor: pointer;
    background: var(--surface);
  }

  /* Buttons (Pill 膠囊形) =================================== */
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: var(--r-pill);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s, color 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
    box-shadow: var(--shadow-brand);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-brand-hover);
  }
  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }
  .btn-primary:disabled {
    background: var(--disabled);
    color: white;
    box-shadow: none;
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    padding: 12px 24px;
  }
  .btn-ghost:hover {
    background: #F5F5F5;
    color: var(--primary-hover);
  }

  /* Thumbnails ============================================= */
  .thumbs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .thumb {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    cursor: grab;
    transition: transform 0.2s, box-shadow 0.2s;
    user-select: none;
  }
  .thumb:hover {
    box-shadow: var(--shadow-elevated);
    transform: translateY(-2px);
  }
  .thumb:active { cursor: grabbing; }
  .thumb.dragging { opacity: 0.35; }
  .thumb.drag-over {
    transform: translateY(-4px);
    box-shadow: 0 0 0 3px var(--primary), var(--shadow-elevated);
  }
  .thumb img {
    -webkit-user-drag: none;
    user-drag: none;
  }
  .thumb-pic {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }
  .thumb-info {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }
  .thumb-order {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--primary);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    box-shadow: var(--shadow-brand);
  }
  .thumb-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(96, 96, 96, 0.85);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    cursor: pointer;
    border: none;
    line-height: 1;
    transition: background 0.15s, transform 0.15s;
  }
  .thumb-remove:hover {
    background: var(--coral);
    transform: scale(1.1);
  }

  /* Preview =============================================== */
  .preview-section {
    background: var(--surface);
    border-radius: var(--r-card);
    padding: 24px;
    box-shadow: var(--shadow-card);
  }
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .preview-header h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }
  .preview-info {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 4px 12px;
    background: var(--primary-tint);
    color: var(--primary-hover);
    border-radius: var(--r-pill);
    font-weight: 600;
  }
  .preview-box {
    max-height: 640px;
    overflow: auto;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    padding: 16px;
    text-align: center;
  }
  .preview-box img {
    max-width: 100%;
    display: inline-block;
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-card);
  }

  .hidden { display: none; }
  .tip {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 16px;
    text-align: center;
    line-height: 1.6;
  }
  .tip-top {
    margin-top: 0;
    margin-bottom: 12px;
    text-align: left;
  }

  /* Footer ================================================ */
  .site-footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .site-footer a {
    color: var(--primary-hover);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }
  .site-footer a:hover { color: var(--primary); }
  .footer-sep {
    display: inline-block;
    margin: 0 8px;
    color: var(--text-muted);
  }

  /* Responsive ============================================ */
  @media (max-width: 768px) {
    body { padding: 32px 16px; }
    h1 { font-size: 28px; }
    .drop-zone { padding: 40px 20px; }
    .drop-zone-icon { width: 64px; height: 64px; font-size: 36px; }
    .controls { padding: 16px; gap: 12px; }
    .thumbs { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .btn { padding: 10px 20px; font-size: 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>截圖拼接工具</h1>
  <p class="subtitle">把多張截圖拖進來，一鍵拼成一張長圖。檔案只在你的瀏覽器處理，不會上傳。</p>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="drop-zone-text">把截圖拖進來，或點這裡選檔，也可直接擷取後按 Ctrl + V 貼上</div>
    <div class="drop-zone-hint">支援 PNG、JPG、WebP，可一次選多張</div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>拼接方向</label>
      <select id="direction">
        <option value="vertical">垂直（上下接）</option>
        <option value="horizontal">水平（左右接）</option>
      </select>
    </div>
    <div class="control-group">
      <label>對齊寬度</label>
      <select id="alignMode">
        <option value="first">以第一張為準</option>
        <option value="min">以最窄為準</option>
        <option value="max">以最寬為準</option>
        <option value="original">不縮放（原圖）</option>
      </select>
    </div>
    <div class="control-group">
      <label>間距</label>
      <input type="number" id="gap" value="0" min="0" max="200">
      <span style="color:var(--muted); font-size:13px;">px</span>
    </div>
    <div class="control-group">
      <label>背景</label>
      <input type="color" id="bgColor" value="#ffffff">
    </div>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" id="clearBtn">清空</button>
    <button class="btn btn-primary" id="downloadBtn" disabled>下載長圖</button>
  </div>

  <p class="tip tip-top hidden" id="thumbsTip">拖曳縮圖互換位置來調整順序；右上 × 可移除單張。</p>
  <div id="thumbs" class="thumbs"></div>

  <div class="preview-section hidden" id="previewSection">
    <div class="preview-header">
      <h2>預覽</h2>
      <div class="preview-info" id="previewInfo"></div>
    </div>
    <div class="preview-box">
      <img id="previewImg" alt="預覽">
    </div>
  </div>

  <footer class="site-footer">
    製作人｜紀澄 Abby
    <span class="footer-sep">·</span>
    <a href="https://github.com/ayumiya90/screenshot-stitcher" target="_blank" rel="noopener">開源於 GitHub</a>
  </footer>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const thumbsEl = document.getElementById('thumbs');
const previewSection = document.getElementById('previewSection');
const previewImg = document.getElementById('previewImg');
const previewInfo = document.getElementById('previewInfo');
const downloadBtn = document.getElementById('downloadBtn');
const clearBtn = document.getElementById('clearBtn');
const directionEl = document.getElementById('direction');
const alignModeEl = document.getElementById('alignMode');
const gapEl = document.getElementById('gap');
const bgColorEl = document.getElementById('bgColor');

let items = []; // { id, name, img, width, height }
let uid = 0;

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles(e.target.files));

['dragenter','dragover'].forEach(ev => {
  dropZone.addEventListener(ev, e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
});
['dragleave','drop'].forEach(ev => {
  dropZone.addEventListener(ev, e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
  });
});
dropZone.addEventListener('drop', e => {
  if (!hasExternalFiles(e.dataTransfer)) return;
  addFiles(e.dataTransfer.files);
});

// 整頁也接受拖入
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  if (!hasExternalFiles(e.dataTransfer)) return;
  if (!dropZone.contains(e.target)) addFiles(e.dataTransfer.files);
});

// 貼上也接受
window.addEventListener('paste', e => {
  const files = [];
  for (const it of e.clipboardData.items) {
    if (it.kind === 'file') {
      const f = it.getAsFile();
      if (f && f.type.startsWith('image/')) files.push(f);
    }
  }
  if (files.length) addFiles(files);
});

async function addFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  // 依檔名排序（常見螢幕截圖序號會依時間順排）
  files.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
  for (const f of files) {
    const img = await loadImage(f);
    items.push({
      id: ++uid,
      name: f.name,
      img,
      width: img.naturalWidth,
      height: img.naturalHeight
    });
  }
  render();
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

function render() {
  thumbsEl.innerHTML = '';
  items.forEach((it, i) => {
    const el = document.createElement('div');
    el.className = 'thumb';
    el.draggable = true;
    el.dataset.id = it.id;
    el.innerHTML = `
      <span class="thumb-order">${i+1}</span>
      <button class="thumb-remove" data-id="${it.id}" title="移除">×</button>
      <img class="thumb-pic" src="${it.img.src}" alt="" draggable="false">
      <div class="thumb-info">
        <span>${it.width}×${it.height}</span>
      </div>
    `;
    thumbsEl.appendChild(el);
  });
  bindThumbEvents();
  document.getElementById('thumbsTip').classList.toggle('hidden', items.length === 0);
  updatePreview();
}

let isInternalDrag = false;
let dragId = null;

function bindThumbEvents() {
  thumbsEl.querySelectorAll('.thumb-remove').forEach(btn => {
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = Number(btn.dataset.id);
      items = items.filter(x => x.id !== id);
      render();
    });
  });

  thumbsEl.querySelectorAll('.thumb').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = Number(el.dataset.id);
      isInternalDrag = true;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'reorder-' + dragId);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      thumbsEl.querySelectorAll('.thumb').forEach(x => x.classList.remove('drag-over'));
      isInternalDrag = false;
      dragId = null;
    });
    el.addEventListener('dragover', e => {
      if (!isInternalDrag) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drag-over');
      const targetId = Number(el.dataset.id);
      if (dragId == null || dragId === targetId) return;
      const fromIdx = items.findIndex(x => x.id === dragId);
      const toIdx = items.findIndex(x => x.id === targetId);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = items.splice(fromIdx, 1);
      items.splice(toIdx, 0, moved);
      render();
    });
  });
}

function hasExternalFiles(dt) {
  if (!dt) return false;
  if (isInternalDrag) return false;
  const types = Array.from(dt.types || []);
  return types.includes('Files') && dt.files && dt.files.length > 0;
}

[directionEl, alignModeEl, gapEl, bgColorEl].forEach(el => {
  el.addEventListener('change', updatePreview);
  el.addEventListener('input', updatePreview);
});

clearBtn.addEventListener('click', () => {
  items = [];
  render();
});

downloadBtn.addEventListener('click', () => {
  if (!items.length) return;
  const canvas = stitch();
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    a.href = url;
    a.download = `拼接_${ts}.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
});

function stitch() {
  const dir = directionEl.value;
  const mode = alignModeEl.value;
  const gap = parseInt(gapEl.value) || 0;
  const bg = bgColorEl.value;

  // 決定每張的繪製尺寸
  let target; // 垂直時代表寬；水平時代表高
  if (mode === 'original') {
    target = null;
  } else {
    const dim = dir === 'vertical' ? 'width' : 'height';
    const vals = items.map(it => it[dim]);
    if (mode === 'first') target = vals[0];
    else if (mode === 'min') target = Math.min(...vals);
    else if (mode === 'max') target = Math.max(...vals);
  }

  // 算每張縮放後的長寬
  const sizes = items.map(it => {
    if (target == null) return { w: it.width, h: it.height };
    if (dir === 'vertical') {
      const w = target;
      const h = Math.round(it.height * (target / it.width));
      return { w, h };
    } else {
      const h = target;
      const w = Math.round(it.width * (target / it.height));
      return { w, h };
    }
  });

  let canvasW, canvasH;
  if (dir === 'vertical') {
    canvasW = Math.max(...sizes.map(s => s.w));
    canvasH = sizes.reduce((s, v) => s + v.h, 0) + gap * (items.length - 1);
  } else {
    canvasH = Math.max(...sizes.map(s => s.h));
    canvasW = sizes.reduce((s, v) => s + v.w, 0) + gap * (items.length - 1);
  }

  const canvas = document.createElement('canvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvasW, canvasH);

  let cursor = 0;
  items.forEach((it, i) => {
    const { w, h } = sizes[i];
    if (dir === 'vertical') {
      const x = Math.floor((canvasW - w) / 2); // 置中
      ctx.drawImage(it.img, x, cursor, w, h);
      cursor += h + gap;
    } else {
      const y = Math.floor((canvasH - h) / 2);
      ctx.drawImage(it.img, cursor, y, w, h);
      cursor += w + gap;
    }
  });

  return canvas;
}

let previewTimer = null;
function updatePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    if (!items.length) {
      previewSection.classList.add('hidden');
      downloadBtn.disabled = true;
      return;
    }
    previewSection.classList.remove('hidden');
    downloadBtn.disabled = false;
    const canvas = stitch();
    previewImg.src = canvas.toDataURL('image/png');
    previewInfo.textContent = `${items.length} 張 · 成品 ${canvas.width} × ${canvas.height} px`;
  }, 100);
}
</script>
</body>
</html>
