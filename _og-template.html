<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #FFF8F0;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #606060;
  }
  .stage {
    width: 1200px;
    height: 630px;
    padding: 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .brand-dot {
    width: 12px;
    height: 12px;
    background: #FFB66E;
    border-radius: 50%;
  }
  .brand-label {
    font-size: 20px;
    font-weight: 700;
    color: #E8973D;
    letter-spacing: 0.05em;
  }

  .main {
    display: flex;
    align-items: center;
    gap: 60px;
  }
  .emoji {
    font-size: 200px;
    line-height: 1;
    flex-shrink: 0;
  }
  .text-block {
    flex: 1;
  }
  h1 {
    font-size: 96px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #404040;
    margin-bottom: 24px;
  }
  .tagline {
    font-size: 34px;
    font-weight: 500;
    line-height: 1.4;
    color: #7A7A7A;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .features {
    display: flex;
    gap: 16px;
  }
  .feat {
    font-size: 20px;
    font-weight: 600;
    color: #8A8A8A;
  }
  .feat-sep {
    color: #D0D0D0;
    font-size: 20px;
  }
  .url-pill {
    background: #FFB66E;
    color: #FFFFFF;
    padding: 14px 28px;
    border-radius: 9999px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(255, 182, 110, 0.4);
  }
</style>
</head>
<body>
<div class="stage">
  <div class="top">
    <span class="brand-dot"></span>
    <span class="brand-label">ABBY TOOLS</span>
  </div>

  <div class="main">
    <div class="emoji">🍊</div>
    <div class="text-block">
      <h1>截圖拼接工具</h1>
      <div class="tagline">多張截圖，一鍵拼成一張長圖</div>
    </div>
  </div>

  <div class="bottom">
    <div class="features">
      <span class="feat">免註冊</span>
      <span class="feat-sep">·</span>
      <span class="feat">免下載 App</span>
      <span class="feat-sep">·</span>
      <span class="feat">檔案不上傳</span>
    </div>
    <div class="url-pill">stitch.abbychi.com</div>
  </div>
</div>
</body>
</html>
